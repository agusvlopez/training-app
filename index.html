<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de entrenamientos</title>

    <!-- STYLE -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- VUE -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.5.16/dist/vue.js"></script>
    <!-- router -->
    <script src="https://unpkg.com/vue-router@3.0.0/dist/vue-router.js"></script>
</head>
<body>
    <div id="contenedor">

         <!-- NAV -->
         <nav class="navbar navbar-dark bg-dark">
            <div class="container-fluid">
              <a class="navbar-brand text-white text-uppercase fs-6 fw-bolder" href="#"><span lang="en">Training App</span></a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                  <li class="nav-item"
                    v-for="item in links"
                    :class="'nav-item' + (item.active ? ' active' : '')"
                    >
                    <a class="nav-link active text-white" aria-current="page" href="#">{{item.text}}</a>
                  </li>
                  <li><hr class="border-light"></li>
                </ul>

                <form class="d-flex" role="search">  
                    <span class="text-light p-1">¿Ya tenés una cuenta?</span>         
                  <button class="btn btn-outline-light rounded-0 text-uppercase" type="submit">Iniciar Sesión</button>
                </form>
              </div>
            </div>
          </nav>

        <!-- esto seria el contenido del Home -->
        <div>
            <img src="img/portada.jpg" alt="Chicas haciendo ejercicio aerobico" class="img-fluid">
            <h1 class="d-none">App de entrenamientos</h1>
        </div>
           



    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script> 
    <script src="js/index.js"></script>
</body>
</html>
