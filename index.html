<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de entrenamientos</title>

    <!-- STYLE -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- VUE -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.5.16/dist/vue.js"></script>
    <!-- router -->
    <script src="https://unpkg.com/vue-router@3.0.0/dist/vue-router.js"></script>
</head>
<body>
    <div id="contenedor">
    <!-- MODAL -->
    <div v-show="modalLogin" class="modal text-white" tabindex="-1" style="display: block;">
        <div class="modal-dialog">
          <div class="modal-content bg-dark">
            <div class="modal-header">
              <p class="modal-title text-uppercase">Iniciar sesión</p>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" @click="cerrarModalLogin"></button>
            </div>
  
            <form @submit.prevent="iniciarSesion">

             <div class="modal-body pb-0">
                <label for="usuario" class="form-label">Ingresá tu usuario</label>
                <input type="text" id="usuario">
            </div>  

            <div class="modal-body">
                <label for="pass" class="form-label">Ingresá tu contraseña</label>
                <input type="password" id="pass">
            </div>
  
            <div class="pt-1 pb-2 ps-3 pe-3">
                <p>Por favor, confirmá que no sos un robot</p>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="robot" id="flexCheckDefault">
                    <label class="form-check-label" for="flexCheckDefault">
                    No soy un robot
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <input type="submit" value="Iniciar sesión" class="btn btn-light">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" @click="cerrarModalLogin">Cancelar</button>
            </div>
            </form>
  
          </div>
        </div>
    </div>
    
     <!-- NAV -->
         <nav class="navbar navbar-dark bg-dark">
            <div class="container-fluid">
              <a class="navbar-brand text-white text-uppercase fs-6 fw-bolder" href="#"><span lang="en">Training App</span></a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li><hr class="border-light"></li>
                  <li class="nav-item"
                    v-for="item in links"
                    :class="'nav-item' + (item.active ? ' active' : '')"
                    v-if="item.enable || login"
                    :key="item.id"
                    >
                    <a class="nav-link text-white" aria-current="page" href="#">
                        {{item.text}}
                    </a>
                  </li>                 
                </ul>
              </div>
            </div>
          </nav>

        <!-- esto seria el contenido del Home -->
        <section>
            <div>
                <img src="img/portada.jpg" alt="Chicas haciendo ejercicio aerobico" class="img-fluid">
                <h1 class="d-none">App de entrenamientos</h1>
            </div>
            <div :class="'p-3' + (login ? '' : ' d-flex justify-content-between')">  
                <p class="text-light pt-1 mb-1 align-self-center"> {{login ? '' : '¿Ya tenés una cuenta?'}}</p>   
                <a href="#" :class="'text-light text-uppercase' + (login ? ' link-entrenar mb-3' : '')">
                  {{login ? '¡Empezar a entrenar!' : ''}} 
                </a>    
                <button 
                @click="toogleLogin"
                :class="'rounded-0 btn p-2'  + (login ? ' btn-link text-light ps-0' : ' btn-outline-light text-uppercase ')" type="submit">
                {{login ? 'Cerrar sesión' : 'Inicia Sesión'}}
                </button>
            </div>

        </section>


    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script> 
    <script src="js/index.js"></script>
</body>
</html>
