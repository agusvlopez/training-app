<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de entrenamientos</title>

    <!-- STYLE -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- VUE -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.5.16/dist/vue.js"></script>
    <!-- router -->
    <script src="https://unpkg.com/vue-router@3.0.0/dist/vue-router.js"></script>

    <!-- COMPONENTES -->
    <script src="./components/login-modal.js"></script>
    <script src="./components/home.js"></script>
    <script src="./components/entrenamientos.js"></script>
    <script src="./components/perfil.js"></script>
</head>
<body>
    <div id="contenedor">
    <!-- MODAL -->
    <login-modal
    :modal-login = "modalLogin"
    :cerrar-modal-login = "cerrarModalLogin"
    :iniciar-sesion = "iniciarSesion"
    ></login-modal>
    
    
     <!-- NAV -->
         <nav class="navbar navbar-dark bg-dark">
            <div class="container-fluid">
              <a class="navbar-brand text-white text-uppercase fs-6 fw-bolder" href="#"><span lang="en">Training App</span></a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li><hr class="border-light"></li>
                  <li class="nav-item"
                    v-for="item in links"
                    :class="'nav-item' + (item.active ? ' active' : '')"
                    v-if="item.enable || login"
                    :key="item.id"
                    v-if="filterEntrenamientos"
                    >
                    <router-link
                     :to="item.url"
                      class="nav-link text-white" aria-current="page">
                        {{item.text}}
                    </router-link>
                  </li>                 
                </ul>
              </div>
            </div>
          </nav>

<main>
  <div>
  
  <!-- ROUTER -->
  <router-view></router-view>  

  <!-- <entrenamientos 
  v-if="login"
  v-for="article in articles"
  :img="article.img"
  :title="article.title"
  :description="article.description"
  :key="article.id"
  :id ="article.id"

></entrenamientos> -->

<section>
            
  <div :class="'p-3' + (login ? '' : ' d-flex justify-content-between')">  
    <p class="text-light pt-1 mb-1 align-self-center"> {{login ? '' : '¿Ya tenés una cuenta?'}}</p>   
    <a href="#" :class="'text-light text-uppercase' + (login ? ' link-entrenar mb-3' : '')">
      {{login ? '¡Empezar a entrenar!' : ''}} 
    </a>    
    <button 
     @click="toogleLogin"
    :class="'rounded-0 btn p-2'  + (login ? ' btn-link text-light ps-0' : ' btn-outline-light text-uppe')" type="submit">
    {{login ? 'Cerrar sesión' : 'Inicia Sesión'}}
    </button>
  </div>

</section>
</div>
</main>  
    </div>
   

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script> 
    <script src="js/index.js"></script>
  
</body>
</html>
